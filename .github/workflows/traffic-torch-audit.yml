name: 🚥 Traffic Torch SEO GEO UX Health Analysis Audit Toolkit

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to audit'
        required: true
        default: 'traffictorch.net'
      tool:
        description: 'Which Traffic Torch tool to run'
        type: choice
        required: true
        default: 'topical-authority-audit-tool'
        options:
          - ⚜️ Topical Authority Audit
          - 🧬 SEO Entity Extractor
          - 🎯 SEO Intent Tool
          - 📍 Local SEO Tool
          - 🛒 Product SEO Tool
          - ⚙️ Schema Generator
          - 🔎 AI Search Optimization
          - 🎙️ AI Voice Search Tool
          - 🤖 AI Audit Tool
          - ⛔ Quit Risk Tool
          - ⚖️ SEO UX Tool
          - 🔑 Keyword Research Tool
          - 🗝️ Keyword Tool
          - 🆚 Keyword vs Tool

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Traffic Torch Audit
        uses: ./
        with:
          url: ${{ inputs.url }}
          tool: ${{ inputs.tool }}
