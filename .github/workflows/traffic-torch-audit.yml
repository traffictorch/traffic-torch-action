name: Traffic Torch Audit (URL only)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to audit'
        required: true
        default: 'https://traffictorch.net'
      tool:
        description: 'Tool to run'
        type: choice
        required: true
        default: 'ai-audit-tool'
        options:
          - ai-audit-tool
          - topical-authority-audit-tool
          - seo-entity-extractor-tool
          - seo-intent-tool
          - local-seo-tool

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Traffic Torch Audit
        uses: ./
        with:
          url: ${{ inputs.url }}
          tool: ${{ inputs.tool }}
