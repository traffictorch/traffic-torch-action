name: Traffic Torch 360° SEO + UX + Design + AEO + GEO Audit

on:
  workflow_dispatch:
    inputs:
      tool:
        description: 'Which Traffic Torch tool to run'
        type: choice
        required: true
        default: 'ai-audit-tool'
        options:
          - ai-audit-tool
          - topical-authority-audit-tool
          - seo-entity-extractor-tool
          - seo-intent-tool
          - local-seo-tool
          - product-seo-tool
          - schema-generator
          - ai-search-optimization-tool
          - ai-voice-search-tool
          - keyword-research-tool
          - keyword-vs-tool
      url:
        description: 'Live URL to audit (leave empty when using HTML file)'
        required: false
        default: 'https://traffictorch.net'
      html_path:
        description: 'Path to HTML file (default test page provided)'
        required: false
        default: 'test-pages/test-page.html'
      open_in_browser:
        description: 'Open full interactive Traffic Torch page in browser'
        type: boolean
        required: false
        default: true

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies & build action
        run: |
          npm ci --ignore-scripts
          npm run build
        working-directory: .

      - name: Run Traffic Torch Audit
        uses: ./
        with:
          url: ${{ inputs.url }}
          html_path: ${{ inputs.html_path }}
          tools: ${{ inputs.tool }}
          open_in_browser: ${{ inputs.open_in_browser }}
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
