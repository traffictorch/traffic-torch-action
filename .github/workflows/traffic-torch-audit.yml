name: Traffic Torch 360° SEO + UX + Design + AEO + GEO Audit

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Live URL to audit'
        required: false
        default: 'https://traffictorch.net'
      html_path:
        description: 'Path to built HTML file (e.g. dist/index.html) — optional'
        required: false
      tools:
        description: 'Modules (comma-separated or "all")'
        required: false
        default: 'all'
      open_in_browser:
        description: 'Open full experience in browser (recommended)'
        required: false
        default: 'true'

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ← THIS IS THE MISSING STEP
      - name: Install dependencies and build
        run: |
          npm ci
          npm run build

      - name: Run Traffic Torch Audit
        uses: ./
        with:
          url: ${{ inputs.url }}
          html_path: ${{ inputs.html_path }}
          tools: ${{ inputs.tools }}
          open_in_browser: ${{ inputs.open_in_browser }}

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: traffic-torch-report
          path: traffic-torch-report.html
