name: Traffic Torch 360° SEO + UX + Design + AEO + GEO Audit

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to audit (your deployed Traffic Torch site or any live URL)'
        required: true
        default: 'https://traffictorch.net'
      threshold:
        description: 'Minimum health score to pass (0-100)'
        required: false
        default: '85'
      tools:
        description: 'Modules to run (comma-separated: seo,ux,design,aeo,geo,entity,intent,local,product,schema,voice,quitrisk,keyword or "all")'
        required: false
        default: 'all'
      competitors:
        description: 'Optional comma-separated competitor URLs'
        required: false

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Traffic Torch Audit
        uses: ./
        with:
          url: ${{ inputs.url }}
          threshold: ${{ inputs.threshold }}
          tools: ${{ inputs.tools }}
          competitors: ${{ inputs.competitors }}
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # forces latest Node for 2026

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: traffic-torch-report
          path: traffic-torch-report.html
