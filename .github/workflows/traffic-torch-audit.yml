name: Traffic Torch 360° SEO + UX + Design + AEO + GEO Audit

on:
  workflow_dispatch:
    inputs:
      tool:
        description: 'Which Traffic Torch tool to run'
        type: choice
        required: true
        default: 'ai-audit-tool'
        options:
          - ai-audit-tool
          - topical-authority-audit-tool
          - seo-entity-extractor-tool
          - seo-intent-tool
          - local-seo-tool
          - product-seo-tool
          - schema-generator
          - ai-search-optimization-tool
          - ai-voice-search-tool
          - keyword-research-tool
          - keyword-vs-tool
      url:
        description: 'Live URL to audit (optional if using HTML file)'
        required: false
        default: 'https://traffictorch.net'
      html_path:
        description: 'Path to built HTML file in your repo (e.g. dist/index.html or public/index.html)'
        required: false
      open_in_browser:
        description: 'Open full interactive page in browser (shows rate limits + upgrade prompts)'
        type: boolean
        required: false
        default: true

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install & build action
        run: |
          npm ci
          npm run build

      - name: Run Traffic Torch Audit
        uses: ./
        with:
          url: ${{ inputs.url }}
          html_path: ${{ inputs.html_path }}
          tools: ${{ inputs.tool }}
          open_in_browser: ${{ inputs.open_in_browser }}
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: traffic-torch-report
          path: traffic-torch-report.html
