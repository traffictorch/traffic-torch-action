name: Traffic Torch 360° SEO + UX + Design + AEO + GEO Audit

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Live URL to audit'
        required: false
        default: 'https://traffictorch.net'
      html_path:
        description: 'Path to built HTML file (optional)'
        required: false
      tools:
        description: 'Modules (comma-separated or "all")'
        required: false
        default: 'all'
      open_in_browser:
        description: 'Open in new browser tab for full experience (rate limits + upgrade prompts)'
        required: false
        default: 'true'

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Traffic Torch Audit
        uses: ./
        with:
          url: ${{ inputs.url }}
          html_path: ${{ inputs.html_path }}
          tools: ${{ inputs.tools }}
          open_in_browser: ${{ inputs.open_in_browser }}
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Upload Report (if generated)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: traffic-torch-report
          path: traffic-torch-report.html
