name: 'Traffic Torch Audit'
description: 'Simple URL audit for Traffic Torch - opens full interactive page'
inputs:
  url:
    description: 'URL to audit'
    required: true
    default: 'https://traffictorch.net'
  tool:
    description: 'Tool to use'
    required: false
    default: 'ai-audit-tool'
runs:
  using: 'composite'
  steps:
    - name: Generate Traffic Torch Audit Link
      shell: bash
      run: |
        echo "🚀 Traffic Torch Audit for ${{ inputs.url }}"
        ENCODED_URL=$$   (echo -n "   $${{ inputs.url }}" | jq -sRr @uri)
        LINK="https://traffictorch.net/$$   {{ inputs.tool }}/?url=   $${ENCODED_URL}"
        
        echo "🔗 Click this link to run the full audit:"
        echo "$LINK"
        
        echo "## Traffic Torch Audit" >> $GITHUB_STEP_SUMMARY
        echo "**URL:** ${{ inputs.url }}" >> $GITHUB_STEP_SUMMARY
        echo "**Tool:** ${{ inputs.tool }}" >> $GITHUB_STEP_SUMMARY
        echo "**Full Audit Link:** [$LINK]($LINK)" >> $GITHUB_STEP_SUMMARY
