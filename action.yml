name: 'Traffic Torch Audit'
description: 'Instant 360° SEO + UX + Design + AEO + GEO audit. Opens full Traffic Torch experience in browser.'
inputs:
  url:
    description: 'Live URL to audit'
    required: false
    default: 'https://traffictorch.net'
  html_path:
    description: 'Path to HTML file'
    required: false
    default: 'test-pages/test-page.html'
  tool:
    description: 'Tool to run'
    required: false
    default: 'ai-audit-tool'
  open_in_browser:
    description: 'Open in browser'
    required: false
    default: 'true'
runs:
  using: 'composite'
  steps:
    - name: Run Traffic Torch Audit
      shell: bash
      run: |
        echo "🚀 Traffic Torch Audit started"
        echo "Tool: ${{ inputs.tool }}"
        echo "HTML path: ${{ inputs.html_path }}"

        if [ -n "${{ inputs.html_path }}" ] && [ -f "${{ inputs.html_path }}" ]; then
          echo "Using HTML file"
          ENCODED_HTML=$(python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.stdin.read()))" < "${{ inputs.html_path }}")
          LINK="https://traffictorch.net/${{ inputs.tool }}/?html=${ENCODED_HTML}"
        else
          echo "Using URL mode"
          ENCODED_URL=$(python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.stdin.read()))" <<< "${{ inputs.url }}")
          LINK="https://traffictorch.net/${{ inputs.tool }}/?url=${ENCODED_URL}"
        fi

        echo "🔗 Full audit link:"
        echo "$LINK"

        echo "## Traffic Torch Audit" >> $GITHUB_STEP_SUMMARY
        echo "**Tool:** ${{ inputs.tool }}" >> $GITHUB_STEP_SUMMARY
        echo "**Link:** [$LINK]($LINK)" >> $GITHUB_STEP_SUMMARY
