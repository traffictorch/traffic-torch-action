name: 'Traffic Torch Audit'
description: 'Opens full Traffic Torch experience in browser with pre-filled HTML or URL'
inputs:
  url:
    description: 'Live URL to audit'
    required: false
    default: 'https://traffictorch.net'
  html_path:
    description: 'Path to HTML file'
    required: false
    default: 'test-pages/test-page.html'
  tool:
    description: 'Tool to run'
    required: false
    default: 'ai-audit-tool'
  open_in_browser:
    description: 'Open in browser'
    required: false
    default: 'true'
runs:
  using: 'composite'
  steps:
    - name: Run Traffic Torch Audit
      shell: bash
      run: |
        echo "🚀 Traffic Torch Audit started"
        echo "Tool: ${{ inputs.tool }}"
        
        if [ -n "${{ inputs.html_path }}" ] && [ -f "${{ inputs.html_path }}" ]; then
          echo "Using HTML file: ${{ inputs.html_path }}"
          ENCODED=$(python3 -c "
import sys, urllib.parse
print(urllib.parse.quote(sys.stdin.read()))
" < "${{ inputs.html_path }}")
          LINK="https://traffictorch.net/${{ inputs.tool }}/?html=${ENCODED}"
        else
          echo "Using URL: ${{ inputs.url }}"
          ENCODED=$(python3 -c "
import sys, urllib.parse
print(urllib.parse.quote(sys.stdin.read()))
" <<< "${{ inputs.url }}")
          LINK="https://traffictorch.net/${{ inputs.tool }}/?url=${ENCODED}"
        fi

        echo "🔗 Full audit link:"
        echo "$LINK"

        echo "## Traffic Torch Audit" >> $GITHUB_STEP_SUMMARY
        echo "**Tool:** ${{ inputs.tool }}" >> $GITHUB_STEP_SUMMARY
        echo "**Link:** [$LINK]($LINK)" >> $GITHUB_STEP_SUMMARY
