name: 'Traffic Torch Audit'
description: 'Instant 360° SEO + UX + Design + AEO + GEO audit. Supports URL or raw HTML input + selectable modules. Uses your live traffictorch.net tools.'
inputs:
  url:
    description: 'URL to audit (optional if html is provided)'
    required: false
  html:
    description: 'Raw HTML code to audit (optional if url is provided)'
    required: false
  threshold:
    description: 'Minimum overall health score (0-100)'
    required: false
    default: '85'
  tools:
    description: 'Comma-separated modules (seo,ux,design,aeo,geo,entity,intent,local,product,schema,voice,quitrisk,keyword or "all")'
    required: false
    default: 'all'
  competitors:
    description: 'Optional comma-separated competitor URLs'
    required: false
outputs:
  health-score:
    description: 'Overall Traffic Torch health score'
  report-html:
    description: 'Path to generated branded HTML report'
  findings:
    description: 'JSON array of issues + AI fixes'
runs:
  using: 'node24'
  main: 'dist/index.js'
