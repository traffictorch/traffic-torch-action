name: 'Traffic Torch Audit'
description: 'Instant 360° SEO + UX + Design + AEO + GEO audit. Opens full Traffic Torch experience in a new browser tab (shows rate limits, upgrade prompts, AI fixes, day/night mode with text-gray-800 / dark:text-gray-200).'
inputs:
  url:
    description: 'Live URL to audit'
    required: false
    default: 'https://traffictorch.net'
  html_path:
    description: 'Path to built HTML file (e.g. dist/index.html) — action reads it automatically'
    required: false
  threshold:
    description: 'Minimum health score (0-100)'
    required: false
    default: '85'
  tools:
    description: 'Modules to run (comma-separated or "all")'
    required: false
    default: 'all'
  open_in_browser:
    description: 'Open full interactive Traffic Torch page in browser (recommended for full experience)'
    required: false
    default: 'true'
outputs:
  report-link:
    description: 'Direct link to the full audit in Traffic Torch'
  health-score:
    description: 'Overall health score (if available)'
runs:
  using: 'node24'
  main: 'dist/index.js'
