name: 'Traffic Torch Audit'
description: 'Simple URL audit - opens full Traffic Torch page'
inputs:
  url:
    description: 'URL to audit'
    required: true
    default: 'traffictorch.net'
  tool:
    description: 'Which Traffic Torch tool to run'
    required: false
    default: 'ai-audit-tool'
runs:
  using: 'composite'
  steps:
    - name: Run Traffic Torch Audit
      shell: bash
      run: |
        echo "🚥 Traffic Torch Audit started for ${{ inputs.url }}"
        
        TOOL="${{ inputs.tool }}"
        if [ "$TOOL" = "⚖️ SEO UX Tool" ]; then
          TOOL_PATH=""
        elif [ "$TOOL" = "🤖 AI Audit Tool" ]; then
          TOOL_PATH="ai-audit-tool"
        elif [ "$TOOL" = "🎙️ AI Voice Search Tool" ]; then
          TOOL_PATH="ai-voice-search-tool"
        elif [ "$TOOL" = "⚜️ Topical Authority Audit" ]; then
          TOOL_PATH="topical-authority-audit-tool"
        else
          TOOL_PATH="ai-audit-tool"
        fi
        
        ENCODED_URL=$(echo -n "${{ inputs.url }}" | jq -sRr @uri)
        LINK="https://traffictorch.net/${TOOL_PATH}/?url=${ENCODED_URL}"
        
        echo "🔗 Click this link to run the full audit:"
        echo "$LINK"
        
        echo "## Traffic Torch Audit" >> $GITHUB_STEP_SUMMARY
        echo "**URL:** ${{ inputs.url }}" >> $GITHUB_STEP_SUMMARY
        echo "**Tool:** ${{ inputs.tool }}" >> $GITHUB_STEP_SUMMARY
        echo "**Link:** [$LINK]($LINK)" >> $GITHUB_STEP_SUMMARY
