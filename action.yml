name: 'Traffic Torch Audit'
description: 'Instant 360° SEO + UX health score with selectable deep-dive modules, implementation gaps, priority fixes, predictive forecasting & educational reports. Built for Traffic Torch website logic.'
inputs:
  url:
    description: 'URL to audit (your deployed site or any live URL)'
    required: true
  threshold:
    description: 'Minimum overall health score (0-100) to pass the check'
    required: false
    default: '85'
  tools:
    description: 'Comma-separated tools/modules to run (e.g. seo,ux,cwv,competitive,aifixes,forecasting or "all")'
    required: false
    default: 'all'
  competitors:
    description: 'Optional comma-separated competitor URLs for gap analysis'
    required: false
outputs:
  health-score:
    description: 'Overall Traffic Torch health score (0-100)'
  report-html:
    description: 'Path to the generated branded HTML report'
  findings:
    description: 'JSON of issues + AI fixes'
runs:
  using: 'node20'
  main: 'dist/index.js'