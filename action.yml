name: 'Traffic Torch Audit'
description: '🚥 Traffic Torch SEO + GEO + UX Health Analysis Audit Toolkit. One-click URL audit with full interactive mobile first experience, day/night mode, priority fixes & educational reports.'
inputs:
  url:
    description: 'URL to audit'
    required: true
    default: 'traffictorch.net'
  tool:
    description: 'Which Traffic Torch tool to run'
    required: false
    default: 'topical-authority-audit-tool'
runs:
  using: 'composite'
  steps:
    - name: Run Traffic Torch Audit
      shell: bash
      run: |
        echo "🚀 Traffic Torch SEO + GEO + UX Health Analysis started for ${{ inputs.url }}"
        
        ENCODED_URL=$(echo -n "${{ inputs.url }}" | jq -sRr @uri)
        LINK="https://traffictorch.net/${{ inputs.tool }}/?url=${ENCODED_URL}"
        
        echo "🔗 Click this link to open the full audit:"
        echo "$LINK"
        
        echo "## 🚥 Traffic Torch SEO + GEO + UX Health Analysis Audit Toolkit" >> $GITHUB_STEP_SUMMARY
        echo "**URL:** ${{ inputs.url }}" >> $GITHUB_STEP_SUMMARY
        echo "**Tool:** ${{ inputs.tool }}" >> $GITHUB_STEP_SUMMARY
        echo "**Full Report Link:** [$LINK]($LINK)" >> $GITHUB_STEP_SUMMARY
